<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОГЭ Оплата</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="bg-white rounded-2xl p-6 shadow-xl text-center">
        <h1 class="text-xl font-bold mb-4">Выберите способ оплаты</h1>
        <div class="space-y-3">
            <button onclick="pay('yoomoney')" class="w-full bg-blue-500 text-white py-3 rounded-lg font-bold">ЮMoney / Карта</button>
            <button onclick="pay('sbp')" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold">СБП (Перевод)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function pay(method) {
            // Отправляем данные прямо в чат бота
            const data = JSON.stringify({
                action: 'payment_method_selected',
                method: method
            });
            tg.sendData(data); // Это закроет Mini App и отправит сообщение боту
        }
    </script>
</body>
</html>
