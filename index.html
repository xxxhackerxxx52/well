<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОГЭ Оплата</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl p-6 shadow-lg border border-gray-100">
        <h1 class="text-xl font-bold text-center mb-6 text-gray-800">💳 Оплата VIP-доступа</h1>
        
        <div class="space-y-4">
            <button onclick="sendPayment('yoomoney')" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-transform active:scale-95">
                ЮMoney / Карта
            </button>
            
            <button onclick="sendPayment('sbp')" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold transition-transform active:scale-95">
                СБП (Перевод)
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendPayment(method) {
            tg.HapticFeedback.impactOccurred('medium'); // Вибрация при нажатии
            
            const data = {
                action: 'payment_method_selected',
                method: method
            };

            // Самый надежный способ - отправить данные как текстовое событие
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
