<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОГЭ 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .stat { display: flex; justify-content: space-between; }
        .badge { font-size: 24px; }
    </style>
</head>
<body>
    <div id="loading">Загрузка...</div>
    <div id="app" style="display: none;">
        <div class="card">
            <h2 id="userName"></h2>
            <p id="userStatus"></p>
        </div>
        <div class="card">
            <div class="stat">Рефералов: <span id="referrals">0</span></div>
            <div class="stat">Прогресс: <span id="progress">0/50</span></div>
        </div>
        <div class="card" id="badges"></div>
        <button onclick="buy()">Купить VIP</button>
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready(); // ← обязательно!

        const user = tg.initDataUnsafe?.user;
        document.getElementById('userName').innerText = user?.first_name || 'Пользователь';

        // Отправляем запрос в бота
        tg.sendData(JSON.stringify({ action: 'get_user_info' }));

        // Слушаем ответ
        tg.onEvent('message', (msg) => {
            const data = JSON.parse(msg);
            if (data.action === 'user_info') {
                document.getElementById('referrals').innerText = data.referrals || 0;
                document.getElementById('progress').innerText = data.referrals + '/50';
                document.getElementById('userStatus').innerText = 'Статус: ' + (data.status || 'none');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        });

        function buy() {
            tg.sendData(JSON.stringify({ action: 'purchase', method: 'yoomoney' }));
        }
    </script>
</body>
</html>
