<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тестовая страница</h1>
    <button onclick="sendTest()">Отправить тестовые данные</button>
    <script>
        function sendTest() {
            const data = JSON.stringify({ action: 'buy', items: ['math', 'russian'] });
            console.log("Отправка:", data);
            window.Telegram.WebApp.sendData(data);
            window.Telegram.WebApp.showAlert("Данные отправлены!");
        }
    </script>
</body>
</html>
